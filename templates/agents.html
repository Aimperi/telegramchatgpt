<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agency — RecipeBotFather</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;--border:#2a2a4a;--accent:#6366f1;--accent2:#818cf8;--text:#f1f5f9;--muted:#94a3b8;--green:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
nav{background:rgba(10,10,20,0.97);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10;}
.nav-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--text);}
.nav-sep{color:var(--border);}
.nav-title{font-size:14px;font-weight:600;color:var(--accent2);}
/* AGENT TABS */
.agent-tabs{display:flex;gap:6px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.agent-tab{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif;}
.agent-tab:hover{border-color:var(--accent);color:var(--text);}
.agent-tab.active{color:#fff;border-color:transparent;}
.agent-tab[data-agent="game_designer"].active{background:#854d0e;}
.agent-tab[data-agent="rapid_prototyper"].active{background:#166534;}
.agent-tab[data-agent="whimsy_injector"].active{background:#831843;}
.agent-tab[data-agent="reality_checker"].active{background:#7f1d1d;}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden;}
/* CHAT PANEL */
.chat-panel{width:420px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.chat-header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-agent-emoji{font-size:22px;}
.chat-agent-name{font-size:14px;font-weight:700;}
.chat-agent-vibe{font-size:11px;color:var(--muted);margin-top:1px;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:8px;max-width:95%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.assistant{align-self:flex-start;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.msg.user .msg-avatar{background:var(--accent);}
.msg.assistant .msg-avatar{background:var(--bg3);border:1px solid var(--border);}
.msg-bubble{padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6;word-break:break-word;}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;}
.msg.assistant .msg-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:14px 14px 14px 4px;}
.msg-bubble pre{background:rgba(0,0,0,0.4);border-radius:6px;padding:8px;margin-top:6px;overflow-x:auto;font-size:11px;max-height:200px;}
.msg-bubble code{font-family:monospace;background:rgba(0,0,0,0.25);padding:1px 4px;border-radius:3px;font-size:11px;}
.typing-ind{display:flex;gap:3px;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;width:fit-content;}
.typing-ind span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.typing-ind span:nth-child(2){animation-delay:.2s;}
.typing-ind span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
/* ACTION BUTTONS */
.action-bar{padding:10px 14px;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;}
.action-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;}
.action-btn:hover{border-color:var(--accent);color:var(--text);}
.action-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.action-btn.primary:hover{background:#4f46e5;}
.action-btn:disabled{opacity:.4;cursor:not-allowed;}
/* INPUT */
.chat-input-area{padding:12px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;resize:none;min-height:40px;max-height:100px;outline:none;transition:border-color .2s;line-height:1.5;}
.chat-input:focus{border-color:var(--accent);}
.chat-input::placeholder{color:var(--muted);}
.send-btn{background:var(--accent);color:#fff;border:none;width:38px;height:38px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .2s;flex-shrink:0;}
.send-btn:hover{background:#4f46e5;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
/* PREVIEW PANEL */
.preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.preview-header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.preview-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.preview-status{font-size:11px;padding:3px 10px;border-radius:10px;background:rgba(99,102,241,0.15);color:var(--accent2);}
.preview-actions{display:flex;gap:8px;}
.preview-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.preview-btn:hover{border-color:var(--accent);color:var(--text);}
.preview-iframe-wrap{flex:1;position:relative;background:#fff;}
.preview-iframe{width:100%;height:100%;border:none;}
.preview-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg3);color:var(--muted);gap:12px;}
.preview-empty-icon{font-size:48px;opacity:.4;}
.preview-empty-text{font-size:14px;}
/* STREAMING indicator */
.streaming-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">🍳 RecipeBotFather</a>
  <span class="nav-sep">/</span>
  <span class="nav-title">🤖 AI Agency</span>
</nav>

<div class="agent-tabs">
  <button class="agent-tab active" data-agent="game_designer" onclick="switchAgent('game_designer')">
    <span class="agent-dot" style="background:#eab308"></span>🎮 Game Designer
  </button>
  <button class="agent-tab" data-agent="rapid_prototyper" onclick="switchAgent('rapid_prototyper')">
    <span class="agent-dot" style="background:#22c55e"></span>⚡ Rapid Prototyper
  </button>
  <button class="agent-tab" data-agent="whimsy_injector" onclick="switchAgent('whimsy_injector')">
    <span class="agent-dot" style="background:#ec4899"></span>✨ Whimsy Injector
  </button>
  <button class="agent-tab" data-agent="reality_checker" onclick="switchAgent('reality_checker')">
    <span class="agent-dot" style="background:#ef4444"></span>🧐 Reality Checker
  </button>
</div>

<div class="main">
  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <span class="chat-agent-emoji" id="agentEmoji">🎮</span>
      <div>
        <div class="chat-agent-name" id="agentName">Game Designer</div>
        <div class="chat-agent-vibe" id="agentVibe">Думает циклами, рычагами и мотивацией игроков</div>
      </div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="action-bar" id="actionBar"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Напишите сообщение..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-header">
      <div class="preview-title">
        🖥 Live Preview
        <span class="preview-status" id="previewStatus">Ожидание</span>
      </div>
      <div class="preview-actions">
        <button class="preview-btn" onclick="copyCode()">📋 Копировать код</button>
        <button class="preview-btn" onclick="clearPreview()">🗑 Очистить</button>
        <button class="preview-btn" onclick="openFullscreen()">⛶ Полный экран</button>
      </div>
    </div>
    <div class="preview-iframe-wrap">
      <div class="preview-empty" id="previewEmpty">
        <div class="preview-empty-icon">🎮</div>
        <div class="preview-empty-text">Здесь появится live preview</div>
        <div style="font-size:12px;color:var(--muted);max-width:280px;text-align:center">Попросите Rapid Prototyper или Whimsy Injector написать HTML — он появится здесь автоматически</div>
      </div>
      <iframe class="preview-iframe" id="previewFrame" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>
</div>

<script>
const AGENTS = {
  game_designer:    { name:'Game Designer',    emoji:'🎮', vibe:'Думает циклами, рычагами и мотивацией игроков',          color:'#eab308' },
  rapid_prototyper: { name:'Rapid Prototyper', emoji:'⚡', vibe:'Превращает идею в рабочий прототип до конца встречи',    color:'#22c55e' },
  whimsy_injector:  { name:'Whimsy Injector',  emoji:'✨', vibe:'Добавляет неожиданные моменты восторга в интерфейс',      color:'#ec4899' },
  reality_checker:  { name:'Reality Checker',  emoji:'🧐', vibe:'По умолчанию NEEDS WORK — требует доказательств',        color:'#ef4444' },
};

let currentAgent = 'game_designer';
let histories = { game_designer:[], rapid_prototyper:[], whimsy_injector:[], reality_checker:[] };
let currentCode = '';
let isStreaming = false;

// Init
switchAgent('game_designer');

function switchAgent(agentId) {
  currentAgent = agentId;
  const a = AGENTS[agentId];
  document.querySelectorAll('.agent-tab').forEach(t => t.classList.toggle('active', t.dataset.agent === agentId));
  document.getElementById('agentEmoji').textContent = a.emoji;
  document.getElementById('agentName').textContent = a.name;
  document.getElementById('agentVibe').textContent = a.vibe;
  renderMessages();
  renderActionBar();
  if (histories[agentId].length === 0) addWelcome(agentId);
}

function addWelcome(agentId) {
  const greets = {
    game_designer: 'Привет! Я **Game Designer** 🎮\n\nПомогу придумать игровые механики, написать концепцию и описать что нужно сделать Rapid Prototyper. Начни с задачи — например: *"Придумай 3 мини-игры на HTML/CSS/JS"*',
    rapid_prototyper: 'Привет! Я **Rapid Prototyper** ⚡\n\nПишу рабочий HTML/CSS/JS код прямо в live preview. Дай мне задачу или передай описание от Game Designer — и я начну кодить.',
    whimsy_injector: 'Привет! Я **Whimsy Injector** ✨\n\nВижу что сделал Rapid Prototyper и добавляю магию: анимации, эффекты, неожиданные детали. Нажми *"Передать мне код"* или опиши что улучшить.',
    reality_checker: 'Привет. Я **Reality Checker** 🧐\n\nМой статус по умолчанию: **NEEDS WORK**. Покажи мне код — найду баги, проблемы UX и что не работает. Потом передашь список Rapid Prototyper для фикса.',
  };
  histories[agentId].push({ role:'assistant', content: greets[agentId] });
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('messages');
  el.innerHTML = histories[currentAgent].map(renderMsg).join('');
  scrollBottom();
}

function renderMsg(msg) {
  const isUser = msg.role === 'user';
  const a = AGENTS[currentAgent];
  return `<div class="msg ${isUser?'user':'assistant'}">
    <div class="msg-avatar">${isUser?'👤':a.emoji}</div>
    <div class="msg-bubble">${fmt(msg.content)}</div>
  </div>`;
}

function fmt(t) {
  return t
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function renderActionBar() {
  const bar = document.getElementById('actionBar');
  const btns = {
    game_designer: `<button class="action-btn primary" onclick="passToAgent('rapid_prototyper')">⚡ Передать Rapid Prototyper</button>`,
    rapid_prototyper: `<button class="action-btn primary" onclick="passToAgent('whimsy_injector')">✨ Передать Whimsy Injector</button>
      <button class="action-btn" onclick="passToAgent('reality_checker')">🧐 Передать Reality Checker</button>`,
    whimsy_injector: `<button class="action-btn primary" onclick="passToAgent('reality_checker')">🧐 Передать Reality Checker</button>
      <button class="action-btn" onclick="passToAgent('rapid_prototyper')">⚡ Вернуть Rapid Prototyper</button>`,
    reality_checker: `<button class="action-btn primary" onclick="passToAgent('rapid_prototyper')">⚡ Отправить фикс Rapid Prototyper</button>`,
  };
  bar.innerHTML = `<button class="action-btn" onclick="clearChat()">🗑 Очистить чат</button>${btns[currentAgent]||''}`;
}

function passToAgent(targetAgent) {
  // Get last assistant message from current agent
  const lastMsgs = histories[currentAgent].filter(m => m.role === 'assistant');
  if (!lastMsgs.length) { alert('Нет сообщений для передачи'); return; }
  const lastMsg = lastMsgs[lastMsgs.length - 1].content;

  const fromAgent = AGENTS[currentAgent];
  const toAgent = AGENTS[targetAgent];

  // Add context message to target agent
  const contextMsg = `[Передано от ${fromAgent.name}]:\n\n${lastMsg}${currentCode ? '\n\n[Текущий код в preview]:\n```html\n' + currentCode + '\n```' : ''}`;
  histories[targetAgent].push({ role: 'user', content: contextMsg });

  switchAgent(targetAgent);

  // Auto-send
  setTimeout(() => autoRespond(targetAgent, contextMsg), 300);
}

async function autoRespond(agentId, userMsg) {
  await streamChat(agentId, histories[agentId]);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function scrollBottom() {
  const el = document.getElementById('messages');
  if (el) el.scrollTop = el.scrollHeight;
}

function clearChat() {
  histories[currentAgent] = [];
  addWelcome(currentAgent);
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  histories[currentAgent].push({ role:'user', content: text });
  renderMessages();

  await streamChat(currentAgent, histories[currentAgent]);
}

async function streamChat(agentId, messages) {
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  // Add typing indicator
  const typingId = 'typing_' + Date.now();
  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML += `<div class="msg assistant" id="${typingId}">
    <div class="msg-avatar">${AGENTS[agentId].emoji}</div>
    <div class="typing-ind"><span></span><span></span><span></span></div>
  </div>`;
  scrollBottom();

  let fullContent = '';

  try {
    const res = await fetch('/agents/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: agentId, messages: messages.slice(-20) })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Ошибка сервера');
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    // Remove typing indicator, add streaming bubble
    document.getElementById(typingId)?.remove();
    const streamId = 'stream_' + Date.now();
    messagesEl.innerHTML += `<div class="msg assistant" id="${streamId}">
      <div class="msg-avatar">${AGENTS[agentId].emoji}</div>
      <div class="msg-bubble" id="streamBubble"></div>
    </div>`;

    document.getElementById('previewStatus').innerHTML = '<span class="streaming-badge">● Генерация...</span>';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.content) {
              fullContent += parsed.content;
              document.getElementById('streamBubble').innerHTML = fmt(fullContent);
              scrollBottom();
              // Extract and update preview if HTML found
              updatePreviewFromContent(fullContent);
            }
          } catch(e) {}
        }
      }
    }

  } catch(err) {
    document.getElementById(typingId)?.remove();
    fullContent = '⚠️ Ошибка: ' + err.message;
    messagesEl.innerHTML += `<div class="msg assistant">
      <div class="msg-avatar">${AGENTS[agentId].emoji}</div>
      <div class="msg-bubble">${fmt(fullContent)}</div>
    </div>`;
  }

  // Save to history
  if (fullContent) {
    histories[agentId].push({ role:'assistant', content: fullContent });
  }

  document.getElementById('previewStatus').textContent = currentCode ? 'Обновлено' : 'Ожидание';
  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
  scrollBottom();
}

function updatePreviewFromContent(content) {
  // Extract full HTML document or html code block
  let html = '';
  const fullDoc = content.match(/```html\n?([\s\S]*?)```/);
  if (fullDoc) {
    html = fullDoc[1].trim();
  } else {
    // Try to find <!DOCTYPE or <html
    const docMatch = content.match(/(<!DOCTYPE[\s\S]*<\/html>)/i);
    if (docMatch) html = docMatch[1];
  }

  if (html && html !== currentCode) {
    currentCode = html;
    const frame = document.getElementById('previewFrame');
    const empty = document.getElementById('previewEmpty');
    frame.style.display = 'block';
    empty.style.display = 'none';
    frame.srcdoc = html;
    document.getElementById('previewStatus').textContent = '✅ Обновлено';
  }
}

function copyCode() {
  if (!currentCode) { alert('Нет кода для копирования'); return; }
  navigator.clipboard.writeText(currentCode).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Скопировано';
    setTimeout(() => btn.textContent = '📋 Копировать код', 2000);
  });
}

function clearPreview() {
  currentCode = '';
  document.getElementById('previewFrame').style.display = 'none';
  document.getElementById('previewEmpty').style.display = 'flex';
  document.getElementById('previewStatus').textContent = 'Ожидание';
}

function openFullscreen() {
  if (!currentCode) { alert('Нет кода для отображения'); return; }
  const w = window.open('', '_blank');
  w.document.write(currentCode);
  w.document.close();
}
</script>
</body>
</html>
