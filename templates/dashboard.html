<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a; min-height: 100vh; color: #fff;
        }
        .navbar {
            background: #1a1a2e; border-bottom: 1px solid #2a2a4a;
            padding: 16px 32px; display: flex;
            align-items: center; justify-content: space-between;
        }
        .navbar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; }
        .navbar-brand span { font-size: 24px; }
        .btn-logout {
            padding: 8px 16px; background: transparent;
            border: 1px solid #2a2a4a; border-radius: 8px;
            color: #9ca3af; font-size: 14px; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: #6366f1; color: #fff; }
        .content {
            display: flex; align-items: center; justify-content: center;
            min-height: calc(100vh - 65px);
        }
        h2 { color: #9ca3af; font-size: 24px; font-weight: 400; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span>👨‍🍳</span>
            Recipe Bot — Admin
        </div>
        <a href="/logout/" class="btn-logout">Выйти</a>
    </nav>
    <div class="content">
        <h2>Админ-панель</h2>
    </div>
</body>
</html>
