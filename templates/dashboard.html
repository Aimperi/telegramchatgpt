<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a; min-height: 100vh; color: #fff;
            display: flex;
        }
        /* Sidebar */
        .sidebar {
            width: 220px; min-height: 100vh; background: #1a1a2e;
            border-right: 1px solid #2a2a4a;
            display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; bottom: 0;
        }
        .sidebar-brand {
            padding: 24px 20px; font-size: 16px; font-weight: 700;
            border-bottom: 1px solid #2a2a4a;
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-brand span { font-size: 22px; }
        .sidebar-nav { flex: 1; padding: 16px 0; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px; font-size: 14px; font-weight: 500;
            color: #6b7280; text-decoration: none;
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .nav-item:hover { color: #e5e7eb; background: #12122a; }
        .nav-item.active { color: #6366f1; border-left-color: #6366f1; background: #12122a; }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .sidebar-footer {
            padding: 16px 20px; border-top: 1px solid #2a2a4a;
        }
        .btn-logout {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 10px 12px; background: transparent;
            border: 1px solid #2a2a4a; border-radius: 8px;
            color: #6b7280; font-size: 14px; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: #6366f1; color: #fff; }
        /* Main content */
        .main {
            margin-left: 220px; flex: 1; display: flex; flex-direction: column;
        }
        .topbar {
            padding: 20px 32px; border-bottom: 1px solid #2a2a4a;
            background: #1a1a2e; font-size: 18px; font-weight: 600; color: #e5e7eb;
            display: flex; align-items: center; justify-content: space-between;
        }
        .content { padding: 40px 32px; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: #1a1a2e; border: 1px solid #2a2a4a;
            border-radius: 12px; padding: 28px 24px;
        }
        .stat-icon { font-size: 32px; margin-bottom: 12px; }
        .stat-value { font-size: 42px; font-weight: 700; color: #6366f1; line-height: 1; }
        .stat-label { font-size: 14px; color: #6b7280; margin-top: 8px; }
        .refresh-hint {
            font-size: 12px; color: #4b5563; font-weight: 400; margin-left: 12px;
        }
        .refresh-hint .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
        }
    </style>
    <script>
        // Auto-refresh dashboard data every 10 seconds
        let refreshInterval;

        async function refreshDashboardData() {
            try {
                const response = await fetch('/api/dashboard/');
                if (!response.ok) {
                    console.error('Failed to fetch dashboard data');
                    return;
                }
                
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error('Error refreshing dashboard data:', error);
            }
        }

        function updateUI(data) {
            const statValues = document.querySelectorAll('.stat-value');
            statValues[0].textContent = data.total_users;
            statValues[1].textContent = data.total_recipes;
        }

        // Start auto-refresh when page loads
        document.addEventListener('DOMContentLoaded', function() {
            refreshInterval = setInterval(refreshDashboardData, 10000); // 10 seconds
        });

        // Clean up interval when page unloads
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span>👨‍🍳</span> RecipeBot
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard/" class="nav-item active">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="/monitoring/" class="nav-item">
                <span class="icon">📡</span> Monitoring
            </a>
            <a href="/settings/" class="nav-item">
                <span class="icon">⚙️</span> Settings
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout/" class="btn-logout">
                <span>🚪</span> Выйти
            </a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            Dashboard
            <span class="refresh-hint">🔄 Автообновление каждые 10 секунд</span>
        </div>
        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👤</div>
                    <div class="stat-value">{{ total_users }}</div>
                    <div class="stat-label">Пользователей</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🍳</div>
                    <div class="stat-value">{{ total_recipes }}</div>
                    <div class="stat-label">Сгенерировано рецептов</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
