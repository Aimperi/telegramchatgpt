<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a; min-height: 100vh; color: #fff;
        }
        .navbar {
            background: #1a1a2e; border-bottom: 1px solid #2a2a4a;
            padding: 16px 32px; display: flex;
            align-items: center; justify-content: space-between;
        }
        .navbar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; }
        .navbar-brand span { font-size: 24px; }
        .btn-logout {
            padding: 8px 16px; background: transparent;
            border: 1px solid #2a2a4a; border-radius: 8px;
            color: #9ca3af; font-size: 14px; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: #6366f1; color: #fff; }
        .content { padding: 40px 32px; }
        .page-title { font-size: 22px; font-weight: 600; margin-bottom: 32px; color: #e5e7eb; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .stat-card {
            background: #1a1a2e; border: 1px solid #2a2a4a;
            border-radius: 12px; padding: 28px 24px;
        }
        .stat-icon { font-size: 32px; margin-bottom: 12px; }
        .stat-value { font-size: 42px; font-weight: 700; color: #6366f1; line-height: 1; }
        .stat-label { font-size: 14px; color: #6b7280; margin-top: 8px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span>👨‍🍳</span>
            Recipe Bot — Admin
        </div>
        <a href="/logout/" class="btn-logout">Выйти</a>
    </nav>
    <div class="content">
        <div class="page-title">Админ-панель</div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👤</div>
                <div class="stat-value">{{ total_users }}</div>
                <div class="stat-label">Пользователей</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🍳</div>
                <div class="stat-value">{{ total_recipes }}</div>
                <div class="stat-label">Сгенерировано рецептов</div>
            </div>
        </div>
    </div>
</body>
</html>
