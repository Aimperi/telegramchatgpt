<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
            --border: #2a2a2a; --accent: #ff6b35; --text: #f1f5f9; --muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* MODE TABS */
        .mode-tabs { display: flex; gap: 6px; }
        .mode-tab {
            background: var(--bg3); border: 1px solid var(--border); color: var(--muted);
            padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .mode-tab:hover { border-color: var(--accent); color: var(--text); }
        .mode-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .main { display: flex; flex: 1; height: calc(100vh - 65px); }
        .panel { flex: 1; padding: 24px; overflow-y: auto; border-right: 1px solid var(--border); }
        .panel:last-child { border-right: none; }
        .panel-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 18px; }

        /* UPLOAD */
        .upload-box {
            width: 100%; aspect-ratio: 16/9; border: 2px dashed var(--border);
            border-radius: 14px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.2s; position: relative; overflow: hidden;
            background: var(--bg3); margin-bottom: 18px;
        }
        .upload-box:hover { border-color: var(--accent); background: rgba(255,107,53,0.05); }
        .upload-box.has-image { border-style: solid; border-color: var(--accent); }
        .upload-box img.preview { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; border-radius: 12px; z-index: 0; }
        .upload-icon { font-size: 32px; margin-bottom: 8px; }
        .upload-text { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.5; }
        .upload-box input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 3; }
        .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; border-radius: 12px; font-size: 13px; color: #fff; z-index: 1; pointer-events: none; }
        .upload-box:hover .upload-overlay { opacity: 1; }

        /* FIELDS */
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
        .field select, .field textarea, .field input[type=range] {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            border-radius: 10px; padding: 9px 13px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        .field select:focus, .field textarea:focus { border-color: var(--accent); }
        .field textarea { resize: vertical; min-height: 90px; }
        .field select option { background: var(--bg3); }
        .range-row { display: flex; align-items: center; gap: 10px; }
        .range-row input[type=range] { flex: 1; padding: 0; border: none; background: none; accent-color: var(--accent); }
        .range-val { font-size: 14px; font-weight: 600; color: var(--accent); min-width: 32px; text-align: right; }

        /* BUTTON */
        .btn-generate {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: background 0.2s, transform 0.15s;
            font-family: 'Inter', sans-serif; display: flex; align-items: center;
            justify-content: center; gap: 8px; margin-top: 4px;
        }
        .btn-generate:hover { background: #e55a25; transform: translateY(-1px); }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* RESULT */
        .result-area {
            width: 100%; aspect-ratio: 16/9; background: var(--bg3);
            border: 1px solid var(--border); border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; margin-bottom: 14px;
        }
        .result-placeholder { text-align: center; color: var(--muted); }
        .result-placeholder .icon { font-size: 44px; margin-bottom: 10px; }
        .result-placeholder p { font-size: 13px; }
        .result-area img, .result-area video { width: 100%; height: 100%; object-fit: contain; border-radius: 13px; }

        /* LOADING */
        .loading-anim { display: none; flex-direction: column; align-items: center; gap: 14px; }
        .loading-anim.active { display: flex; }
        .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 13px; color: var(--muted); text-align: center; }
        .progress-bar-wrap { width: 200px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; animation: progress 60s linear forwards; }
        @keyframes progress { from { width: 0% } to { width: 95% } }

        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .result-animated { animation: fadeInScale 0.5s ease; }

        .status-bar { font-size: 12px; color: var(--muted); min-height: 18px; }
        .status-bar.error { color: #f87171; }
        .status-bar.success { color: #4ade80; }

        .btn-download { display: none; width: 100%; background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 9px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: border-color 0.2s; font-family: 'Inter', sans-serif; margin-top: 8px; }
        .btn-download:hover { border-color: var(--accent); }
        .btn-download.visible { display: block; }

        @media (max-width: 768px) {
            .main { flex-direction: column; height: auto; }
            .panel { border-right: none; border-bottom: 1px solid var(--border); }
            header { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">GR<span>O</span>K</div>
    <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode('image')">🖼 Редактировать фото</button>
        <button class="mode-tab" onclick="switchMode('video')">🎬 Анимировать фото → Видео</button>
    </div>
</header>

<div class="main">
    <!-- LEFT PANEL -->
    <div class="panel">
        <div class="panel-title" id="leftTitle">Настройки генерации изображения</div>

        <!-- Upload -->
        <div class="upload-box" id="uploadBox">
            <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
            <div class="upload-icon">🎲</div>
            <div class="upload-text" id="uploadText">Нажмите чтобы загрузить<br>референс изображение (опционально)</div>
            <div class="upload-overlay">Изменить изображение</div>
        </div>

        <!-- IMAGE MODE fields -->
        <div id="imageFields">
            <div class="field">
                <label>Соотношение сторон</label>
                <select id="imgAspect">
                    <option value="1:1">1:1 — Квадрат</option>
                    <option value="16:9" selected>16:9 — Широкий</option>
                    <option value="9:16">9:16 — Портрет</option>
                    <option value="4:3">4:3 — Стандарт</option>
                    <option value="3:2">3:2 — Фото</option>
                </select>
            </div>
            <div class="field">
                <label>Разрешение</label>
                <select id="imgResolution">
                    <option value="1k" selected>1K</option>
                    <option value="2k">2K</option>
                </select>
            </div>
        </div>

        <!-- VIDEO MODE fields -->
        <div id="videoFields" style="display:none;">
            <div class="field">
                <label>Соотношение сторон</label>
                <select id="vidAspect">
                    <option value="16:9" selected>16:9 — Широкий</option>
                    <option value="9:16">9:16 — Вертикальный</option>
                    <option value="1:1">1:1 — Квадрат</option>
                    <option value="4:3">4:3 — Стандарт</option>
                </select>
            </div>
            <div class="field">
                <label>Разрешение</label>
                <select id="vidResolution">
                    <option value="480p" selected>480p — Стандарт (быстрее)</option>
                    <option value="720p">720p — HD (медленнее)</option>
                </select>
            </div>
            <div class="field">
                <label>Продолжительность: <span id="durationVal">5</span> сек</label>
                <div class="range-row">
                    <input type="range" id="duration" min="1" max="15" value="5" oninput="document.getElementById('durationVal').textContent=this.value">
                    <span class="range-val" id="durationVal2"></span>
                </div>
            </div>
        </div>

        <!-- Prompt -->
        <div class="field">
            <label>Промт</label>
            <textarea id="prompt" placeholder="Опишите что хотите сгенерировать..."></textarea>
        </div>

        <button class="btn-generate" id="generateBtn" onclick="generate()">
            <span id="genIcon">✨</span> <span id="genLabel">Генерировать изображение</span>
        </button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel">
        <div class="panel-title">Результат</div>

        <div class="result-area" id="resultArea">
            <div class="result-placeholder" id="placeholder">
                <div class="icon" id="placeholderIcon">🖼</div>
                <p id="placeholderText">Здесь появится<br>сгенерированное изображение</p>
            </div>
            <div class="loading-anim" id="loadingAnim">
                <div class="spinner"></div>
                <div class="loading-text" id="loadingText">Генерирую...</div>
                <div class="progress-bar-wrap" id="progressWrap" style="display:none;">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <div class="status-bar" id="statusBar"></div>
        <button class="btn-download" id="downloadBtn" onclick="downloadResult()">⬇ Скачать</button>
    </div>
</div>

<script>
    let mode = 'image';
    let uploadedImageBase64 = null;
    let resultUrl = null;

    function switchMode(m) {
        mode = m;
        document.querySelectorAll('.mode-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && m === 'image') || (i === 1 && m === 'video')));
        document.getElementById('imageFields').style.display = m === 'image' ? 'block' : 'none';
        document.getElementById('videoFields').style.display = m === 'video' ? 'block' : 'none';
        document.getElementById('leftTitle').textContent = m === 'image' ? 'Настройки генерации изображения' : 'Настройки генерации видео';
        document.getElementById('genLabel').textContent = m === 'image' ? 'Генерировать изображение' : 'Генерировать видео';
        document.getElementById('uploadText').textContent = m === 'image' ? 'Нажмите чтобы загрузить\nреференс изображение (опционально)' : 'Нажмите чтобы загрузить\nисходное изображение для анимации';
        document.getElementById('placeholderIcon').textContent = m === 'image' ? '🖼' : '🎬';
        document.getElementById('placeholderText').textContent = m === 'image' ? 'Здесь появится\nсгенерированное изображение' : 'Здесь появится\nсгенерированное видео';
        clearResult();
    }

    function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            uploadedImageBase64 = ev.target.result;
            const box = document.getElementById('uploadBox');
            const old = box.querySelector('img.preview');
            if (old) old.remove();
            const img = document.createElement('img');
            img.src = uploadedImageBase64;
            img.className = 'preview';
            box.appendChild(img);
            box.classList.add('has-image');
            box.querySelector('.upload-icon').style.display = 'none';
            box.querySelector('#uploadText') && (box.querySelector('.upload-text').style.display = 'none');
        };
        reader.readAsDataURL(file);
    }

    function clearResult() {
        const area = document.getElementById('resultArea');
        area.querySelectorAll('img.result-img, video.result-vid').forEach(el => el.remove());
        document.getElementById('placeholder').style.display = 'flex';
        document.getElementById('loadingAnim').classList.remove('active');
        document.getElementById('downloadBtn').classList.remove('visible');
        document.getElementById('statusBar').textContent = '';
        resultUrl = null;
    }

    async function generate() {
        const prompt = document.getElementById('prompt').value.trim();
        if (!prompt) { setStatus('Введите промт для генерации', 'error'); return; }
        if (mode === 'video' && !uploadedImageBase64) { setStatus('Загрузите изображение для генерации видео', 'error'); return; }

        const btn = document.getElementById('generateBtn');
        const icon = document.getElementById('genIcon');
        const area = document.getElementById('resultArea');

        btn.disabled = true;
        icon.textContent = '⏳';
        document.getElementById('placeholder').style.display = 'none';
        area.querySelectorAll('img.result-img, video.result-vid').forEach(el => el.remove());
        document.getElementById('downloadBtn').classList.remove('visible');

        const loadingAnim = document.getElementById('loadingAnim');
        loadingAnim.classList.add('active');

        if (mode === 'video') {
            document.getElementById('loadingText').textContent = 'Генерирую видео... это может занять несколько минут';
            document.getElementById('progressWrap').style.display = 'block';
            // Reset progress bar animation
            const pb = document.getElementById('progressBar');
            pb.style.animation = 'none';
            pb.offsetHeight; // reflow
            pb.style.animation = '';
        } else {
            document.getElementById('loadingText').textContent = 'Генерирую изображение...';
            document.getElementById('progressWrap').style.display = 'none';
        }

        setStatus('Отправляю запрос...', '');

        try {
            if (mode === 'image') {
                await generateImage(prompt, area);
            } else {
                await generateVideo(prompt, area);
            }
        } catch (err) {
            loadingAnim.classList.remove('active');
            document.getElementById('placeholder').style.display = 'flex';
            setStatus('Ошибка: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            icon.textContent = '✨';
        }
    }

    async function generateImage(prompt, area) {
        const payload = {
            prompt,
            aspect_ratio: document.getElementById('imgAspect').value,
            resolution: document.getElementById('imgResolution').value,
            image_base64: uploadedImageBase64,
        };
        const res = await fetch('/grok/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка генерации');

        resultUrl = data.image_url;
        const img = document.createElement('img');
        img.src = resultUrl;
        img.className = 'result-img result-animated';
        document.getElementById('loadingAnim').classList.remove('active');
        area.appendChild(img);
        document.getElementById('downloadBtn').textContent = '⬇ Скачать изображение';
        document.getElementById('downloadBtn').classList.add('visible');
        setStatus('Готово!', 'success');
    }

    async function generateVideo(prompt, area) {
        const payload = {
            prompt,
            aspect_ratio: document.getElementById('vidAspect').value,
            resolution: document.getElementById('vidResolution').value,
            duration: parseInt(document.getElementById('duration').value),
            image_base64: uploadedImageBase64,
        };

        console.log('Video payload: image_base64 present =', !!uploadedImageBase64, ', size =', uploadedImageBase64 ? uploadedImageBase64.length : 0);
        console.log('Video payload keys:', Object.keys(payload));

        // Step 1: start generation
        setStatus('Запускаю генерацию видео...', '');
        const res = await fetch('/grok/video/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка запуска');

        const requestId = data.request_id;
        setStatus(`Видео генерируется (ID: ${requestId.slice(0,8)}...)`, '');

        // Step 2: poll
        let attempts = 0;
        while (attempts < 120) {
            await new Promise(r => setTimeout(r, 5000));
            attempts++;
            document.getElementById('loadingText').textContent = `Генерирую видео... ${attempts * 5} сек`;

            const pollRes = await fetch(`/grok/video/status/${requestId}`);
            const pollData = await pollRes.json();

            if (pollData.status === 'done') {
                resultUrl = pollData.video_url;
                const video = document.createElement('video');
                video.src = resultUrl;
                video.className = 'result-vid result-animated';
                video.controls = true;
                video.autoplay = true;
                video.loop = true;
                document.getElementById('loadingAnim').classList.remove('active');
                area.appendChild(video);
                document.getElementById('downloadBtn').textContent = '⬇ Скачать видео';
                document.getElementById('downloadBtn').classList.add('visible');
                setStatus(`Готово! Длительность: ${pollData.duration}с`, 'success');
                return;
            } else if (pollData.status === 'expired') {
                throw new Error('Запрос истёк, попробуйте снова');
            }
        }
        throw new Error('Превышено время ожидания (10 минут)');
    }

    function setStatus(msg, type) {
        const el = document.getElementById('statusBar');
        el.textContent = msg;
        el.className = 'status-bar' + (type ? ' ' + type : '');
    }

    function downloadResult() {
        if (!resultUrl) return;
        const a = document.createElement('a');
        a.href = resultUrl;
        a.download = mode === 'video' ? 'grok-video.mp4' : 'grok-image.png';
        a.target = '_blank';
        a.click();
    }
</script>
</body>
</html>
