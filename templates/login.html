<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Панель администратора</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; display: block; margin-bottom: 12px; }
        .logo h1 { color: #fff; font-size: 22px; font-weight: 600; }
        .logo p { color: #6b7280; font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #9ca3af; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%; padding: 12px 16px;
            background: #0f0f1a; border: 1px solid #2a2a4a;
            border-radius: 8px; color: #fff; font-size: 15px;
            transition: border-color 0.2s; outline: none;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #4b5563; }
        .error-message {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: #f87171; padding: 12px 16px; border-radius: 8px;
            font-size: 14px; margin-bottom: 20px; text-align: center;
        }
        .btn-login {
            width: 100%; padding: 13px; background: #6366f1;
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: background 0.2s; margin-top: 8px;
        }
        .btn-login:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span class="logo-icon">👨‍🍳</span>
            <h1>Recipe Bot</h1>
            <p>Панель администратора</p>
        </div>
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" placeholder="Введите логин" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn-login">Войти</button>
        </form>
    </div>
</body>
</html>
