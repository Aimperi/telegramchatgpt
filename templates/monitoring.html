<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring — Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a; min-height: 100vh; color: #fff; display: flex;
        }
        .sidebar {
            width: 220px; min-height: 100vh; background: #1a1a2e;
            border-right: 1px solid #2a2a4a; display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; bottom: 0;
        }
        .sidebar-brand {
            padding: 24px 20px; font-size: 16px; font-weight: 700;
            border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 10px;
        }
        .sidebar-brand span { font-size: 22px; }
        .sidebar-nav { flex: 1; padding: 16px 0; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px; font-size: 14px; font-weight: 500;
            color: #6b7280; text-decoration: none;
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .nav-item:hover { color: #e5e7eb; background: #12122a; }
        .nav-item.active { color: #6366f1; border-left-color: #6366f1; background: #12122a; }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid #2a2a4a; }
        .btn-logout {
            display: flex; align-items: center; gap: 10px; width: 100%;
            padding: 10px 12px; background: transparent; border: 1px solid #2a2a4a;
            border-radius: 8px; color: #6b7280; font-size: 14px; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: #6366f1; color: #fff; }
        .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
        .topbar {
            padding: 16px 32px; border-bottom: 1px solid #2a2a4a;
            background: #1a1a2e; display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-title { font-size: 18px; font-weight: 600; color: #e5e7eb; }
        /* Auto-refresh indicator */
        .refresh-bar {
            display: flex; align-items: center; gap: 10px; font-size: 13px; color: #6b7280;
        }
        .refresh-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
            animation: pulse 2s infinite;
        }
        .refresh-dot.loading { background: #facc15; animation: spin 1s linear infinite; }
        .countdown {
            font-size: 12px; color: #4b5563;
            background: #12122a; border: 1px solid #2a2a4a;
            padding: 3px 10px; border-radius: 20px;
        }
        .last-updated { font-size: 12px; color: #4b5563; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
        @keyframes spin { to { transform: rotate(360deg); } }
        .content { padding: 28px 32px; }
        /* Cards */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-bottom: 28px;
        }
        .card {
            background: #1a1a2e; border: 1px solid #2a2a4a;
            border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 14px;
            transition: border-color 0.3s;
        }
        .card.updating { border-color: #6366f1; }
        .card-header { display: flex; align-items: center; justify-content: space-between; }
        .card-title {
            font-size: 12px; font-weight: 600; color: #6b7280;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .card-icon { font-size: 20px; }
