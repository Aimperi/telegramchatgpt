<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла успешно — RecipeBotFather</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a14; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #12121f; border: 1px solid #2a2a4a; border-radius: 24px; padding: 56px 48px; text-align: center; max-width: 480px; width: 90%; }
        .icon { font-size: 72px; margin-bottom: 24px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: #4ade80; }
        p { font-size: 16px; color: #94a3b8; line-height: 1.6; margin-bottom: 32px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #6366f1; color: #fff; padding: 14px 28px;
            border-radius: 10px; font-size: 16px; font-weight: 600;
            text-decoration: none; transition: background 0.2s;
        }
        .btn:hover { background: #4f46e5; }
        .order-id { font-size: 12px; color: #4b5563; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Оплата прошла!</h1>
        <p>Спасибо за покупку. Рецепт уже ждёт тебя в Telegram-боте.</p>
        <a href="https://t.me/receptchatgpt_bot" class="btn" target="_blank">✈️ Открыть бота</a>
        <div class="order-id" id="orderId"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const inv = params.get('invoice_id') || params.get('order_id');
        if (inv) document.getElementById('orderId').textContent = 'ID заказа: ' + inv;
    </script>
</body>
</html>
